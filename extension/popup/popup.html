<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClawPet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .api-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .api-online  { background: rgba(52,211,153,0.15); color: #34d399; }
    .api-offline { background: rgba(248,113,113,0.15); color: #f87171; }

    /* Main lobster display - big with animation */
    .lobster-main {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .lobster-img {
      width: 96px;
      height: 96px;
      margin: 0 auto 12px;
      image-rendering: pixelated;
      animation: lobster-bob 2s ease-in-out infinite;
    }
    @keyframes lobster-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .lobster-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .lobster-state { font-size: 12px; color: #64748b; }

    /* Agents section */
    .section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .section-title { 
      font-size: 10px; 
      color: #64748b; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      margin-bottom: 10px;
    }

    .agent-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .agent-row:last-child { border-bottom: none; }
    .agent-img {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
    }
    .agent-info { flex: 1; overflow: hidden; }
    .agent-name { font-weight: 600; font-size: 13px; }
    .agent-task { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-state { 
      font-size: 10px; 
      padding: 3px 8px; 
      border-radius: 12px; 
      font-weight: 600;
      white-space: nowrap;
    }

    .state-working  { color: #34d399; background: rgba(52,211,153,0.15); }
    .state-searching { color: #60a5fa; background: rgba(96,165,250,0.15); }
    .state-idle     { color: #94a3b8; background: rgba(148,163,184,0.1); }
    .state-thinking { color: #a78bfa; background: rgba(167,139,250,0.15); }
    .state-waiting  { color: #fbbf24; background: rgba(251,191,36,0.15); }
    .state-error    { color: #f87171; background: rgba(248,113,113,0.15); }
    .state-done     { color: #34d399; background: rgba(52,211,153,0.15); }
    .state-sleeping { color: #64748b; background: rgba(71,85,105,0.2); }

    /* Evolution section */
    .evo-desc { 
      font-size: 10px; 
      color: #475569; 
      margin-bottom: 10px; 
      line-height: 1.4; 
    }
    .evo-info { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .evo-stage { font-weight: 600; font-size: 12px; }
    .evo-pct { color: #64748b; font-size: 11px; }
    .bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .bar-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #f97316, #ef4444); 
      border-radius: 3px; 
      transition: width 0.4s; 
    }
    .evo-next { 
      font-size: 10px; 
      color: #64748b; 
      margin-top: 6px; 
    }

    /* Icon-only buttons with hover tooltip */
    .btn-row { 
      display: flex; 
      gap: 8px; 
      padding: 12px 16px; 
      justify-content: center;
    }
    .btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }
    .btn:active { transform: scale(0.95); }
    
    /* Tooltip on hover */
    .btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #e2e8f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn:hover::after { opacity: 1; }

    .offline-msg { padding: 20px; text-align: center; color: #64748b; }
    .offline-msg a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🦞 ClawPet</div>
    <div class="api-status" id="apiStatus">...</div>
  </div>

  <div id="content">
    <div class="offline-msg">Loading...</div>
  </div>

  <!-- Icon-only buttons with hover tooltips -->
  <div class="btn-row">
    <button class="btn" id="btnBox" data-tooltip="Daily Box">🎁</button>
    <button class="btn" id="btnBackpack" data-tooltip="Backpack">🎒</button>
    <button class="btn" id="btnDashboard" data-tooltip="Dashboard">📊</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
