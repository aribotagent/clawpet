<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClawPet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .header-sub { font-size: 11px; color: #64748b; }

    .api-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .api-online  { background: rgba(52,211,153,0.15); color: #34d399; }
    .api-offline { background: rgba(248,113,113,0.15); color: #f87171; }

    .section { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .section-title { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .agent-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .agent-row:last-child { border-bottom: none; }
    .agent-emoji { font-size: 20px; }
    .agent-info { flex: 1; overflow: hidden; }
    .agent-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-task { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-state { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }

    .state-working  { color: #34d399; background: rgba(52,211,153,0.12); }
    .state-searching { color: #60a5fa; background: rgba(96,165,250,0.12); }
    .state-idle     { color: #94a3b8; background: rgba(148,163,184,0.1); }
    .state-thinking { color: #a78bfa; background: rgba(167,139,250,0.12); }
    .state-waiting  { color: #fbbf24; background: rgba(251,191,36,0.12); }
    .state-error    { color: #f87171; background: rgba(248,113,113,0.12); }
    .state-done     { color: #34d399; background: rgba(52,211,153,0.12); }
    .state-sleeping { color: #64748b; background: rgba(71,85,105,0.2); }

    .evolution-bar { margin-top: 6px; }
    .evo-info { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .evo-stage { font-weight: 600; }
    .evo-pct { color: #64748b; }
    .bar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #f97316, #ef4444); border-radius: 3px; transition: width 0.4s; }

    .btn-row { display: flex; gap: 6px; padding: 10px 16px; }
    .btn {
      flex: 1; padding: 7px 4px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #cbd5e1;
      border-radius: 8px; cursor: pointer; font-size: 11px;
      text-align: center; transition: background 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn-icon { font-size: 16px; }
    .btn-backpack { color: #fbbf24; border-color: rgba(251,191,36,0.2); }
    .btn-box { color: #a855f7; border-color: rgba(168,85,247,0.2); }
    .btn-dash { color: #60a5fa; border-color: rgba(96,165,250,0.2); }

    .offline-msg { padding: 16px; text-align: center; color: #64748b; }
    .offline-msg a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">🦞 ClawPet</div>
      <div class="header-sub">Your lobster army</div>
    </div>
    <div class="api-status" id="apiStatus">...</div>
  </div>

  <div id="content">
    <div class="offline-msg">Loading...</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-box" id="btnBox">
      <span class="btn-icon">🎁</span>
      <span>Daily Box</span>
    </button>
    <button class="btn btn-backpack" id="btnBackpack">
      <span class="btn-icon">🎒</span>
      <span>Backpack</span>
    </button>
    <button class="btn btn-dash" id="btnDashboard">
      <span class="btn-icon">📊</span>
      <span>Dashboard</span>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
