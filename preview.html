<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClawPet — Lobster Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 32px; }
h1 { font-size: 24px; margin-bottom: 24px; }
h2 { font-size: 16px; margin: 24px 0 12px; color: #94a3b8; }
.grid { display: flex; flex-wrap: wrap; gap: 16px; }
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  width: 90px;
}
.card .label { font-size: 10px; color: #64748b; margin-top: 6px; }
.card .name { font-size: 11px; color: #cbd5e1; font-weight: 600; }
.lobster-wrap {
  width: 56px; height: 56px; margin: 0 auto;
}
.section { margin-bottom: 32px; }

/* Animations */
.anim-idle svg { animation: bob 3s ease-in-out infinite; }
.anim-working svg { animation: work 0.6s ease-in-out infinite; }
.anim-searching svg { animation: search 1.2s ease-in-out infinite; }
.anim-thinking svg { animation: think 2s ease-in-out infinite; }
.anim-sleeping svg { animation: sleep 4s ease-in-out infinite; }
.anim-error svg { animation: shake 0.3s ease-in-out infinite; }
.anim-done svg { animation: celebrate 0.5s ease-in-out infinite; }
.anim-waiting svg { animation: bob 1.5s ease-in-out infinite; }

@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes work { 0%,100%{transform:rotate(-8deg) scale(1.05)} 50%{transform:rotate(8deg) scale(1.05)} }
@keyframes search { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
@keyframes think { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(0.95) rotate(5deg)} }
@keyframes sleep { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(0.95);opacity:0.7} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 60%{transform:translateX(3px)} }
@keyframes celebrate { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.15)} }
</style>
</head>
<body>
<h1>🦞 ClawPet — Lobster Preview</h1>

<div class="section">
<h2>Evolution Stages (idle state)</h2>
<div class="grid" id="stages"></div>
</div>

<div class="section">
<h2>All States (Shrimp stage)</h2>
<div class="grid" id="states"></div>
</div>

<div class="section">
<h2>All States (Blue Lobster stage)</h2>
<div class="grid" id="states2"></div>
</div>

<script>
const STAGE_COLORS={shrimp:{body:"#FF6B6B",bodyDark:"#E05555",shell:"#FF8C8C",claw:"#FF5252",eye:"#1A1A2E",pupil:"#FFFFFF",antenna:"#FFB3B3",leg:"#E05555"},lobster:{body:"#4A9EDB",bodyDark:"#2E7FBE",shell:"#6AB4E8",claw:"#2E7FBE",eye:"#1A1A2E",pupil:"#FFFFFF",antenna:"#A8D4F5",leg:"#2E7FBE"},"red-lobster":{body:"#E53935",bodyDark:"#B71C1C",shell:"#EF5350",claw:"#B71C1C",eye:"#1A1A2E",pupil:"#FFD700",antenna:"#FF8A80",leg:"#B71C1C"},"emperor-crab":{body:"#FFD700",bodyDark:"#F9A825",shell:"#FFE57F",claw:"#F9A825",eye:"#1A1A2E",pupil:"#FFFFFF",antenna:"#FFF9C4",leg:"#F9A825"},"cosmos-lobster":{body:"#7C4DFF",bodyDark:"#4527A0",shell:"#9C6EFF",claw:"#4527A0",eye:"#E040FB",pupil:"#FFFFFF",antenna:"#CE93D8",leg:"#4527A0"},hidden:{body:"#263238",bodyDark:"#000000",shell:"#37474F",claw:"#000000",eye:"#00E5FF",pupil:"#FFFFFF",antenna:"#546E7A",leg:"#000000"}};
const STATE_MODS={idle:{eyeSize:1,clawAngle:0,bodyScale:1,blush:false},thinking:{eyeSize:0.8,clawAngle:30,bodyScale:1,blush:false},working:{eyeSize:1.1,clawAngle:-20,bodyScale:1.05,blush:false},searching:{eyeSize:1.3,clawAngle:10,bodyScale:1,blush:false},waiting:{eyeSize:0.9,clawAngle:-5,bodyScale:1,blush:false},error:{eyeSize:0.7,clawAngle:180,bodyScale:0.95,blush:false},done:{eyeSize:1.2,clawAngle:45,bodyScale:1.1,blush:true},sleeping:{eyeSize:0.3,clawAngle:-10,bodyScale:0.95,blush:false}};
const STAGE_NAMES={shrimp:"🦐 Tiny Shrimp",lobster:"🦞 Blue Lobster","red-lobster":"🦞 Red Devil","emperor-crab":"🦀 Emperor Crab","cosmos-lobster":"🌌 Cosmos","hidden":"??? Hidden"};

function getLobsterSVG(stage,state){
const c=STAGE_COLORS[stage]||STAGE_COLORS.shrimp;const mod=STATE_MODS[state]||STATE_MODS.idle;
const cx=28,cy=28;const eyeR=4*mod.eyeSize;const isSleeping=state==="sleeping";const isError=state==="error";const isDone=state==="done";
const clawL=mod.clawAngle;const clawR=-mod.clawAngle;
return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
<defs><radialGradient id="bg-${stage}-${state}" cx="45%" cy="35%" r="60%"><stop offset="0%" stop-color="${c.shell}"/><stop offset="100%" stop-color="${c.bodyDark}"/></radialGradient>
${stage==="cosmos-lobster"?`<radialGradient id="glow-${state}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.4"/><stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/></radialGradient>`:""}</defs>
${stage==="cosmos-lobster"?`<ellipse cx="28" cy="28" rx="22" ry="22" fill="url(#glow-${state})"/>`:""} 
<line x1="${cx-6}" y1="${cy-12}" x2="${cx-14}" y2="${cy-22}" stroke="${c.antenna}" stroke-width="1.2" stroke-linecap="round"/>
<line x1="${cx+6}" y1="${cy-12}" x2="${cx+14}" y2="${cy-22}" stroke="${c.antenna}" stroke-width="1.2" stroke-linecap="round"/>
<ellipse cx="${cx}" cy="${cy+16}" rx="7" ry="4" fill="${c.bodyDark}" opacity="0.8"/>
<ellipse cx="${cx}" cy="${cy+13}" rx="9" ry="4.5" fill="${c.body}" opacity="0.9"/>
<ellipse cx="${cx}" cy="${cy}" rx="12" ry="14" fill="url(#bg-${stage}-${state})"/>
<ellipse cx="${cx}" cy="${cy-4}" rx="9" ry="5" fill="${c.shell}" opacity="0.5"/>
<ellipse cx="${cx}" cy="${cy+2}" rx="10" ry="5" fill="${c.bodyDark}" opacity="0.25"/>
<g transform="translate(${cx-12},${cy-2}) rotate(${clawL},0,0)"><ellipse cx="-3" cy="0" rx="5" ry="3.5" fill="${c.claw}"/><ellipse cx="-7" cy="0" rx="3" ry="2" fill="${c.bodyDark}" opacity="0.6"/><line x1="0" y1="0" x2="8" y2="0" stroke="${c.leg}" stroke-width="2" stroke-linecap="round"/></g>
<g transform="translate(${cx+12},${cy-2}) rotate(${clawR},0,0)"><ellipse cx="3" cy="0" rx="5" ry="3.5" fill="${c.claw}"/><ellipse cx="7" cy="0" rx="3" ry="2" fill="${c.bodyDark}" opacity="0.6"/><line x1="0" y1="0" x2="-8" y2="0" stroke="${c.leg}" stroke-width="2" stroke-linecap="round"/></g>
<line x1="${cx-11}" y1="${cy+4}" x2="${cx-16}" y2="${cy+9}" stroke="${c.leg}" stroke-width="1.2" stroke-linecap="round"/>
<line x1="${cx-10}" y1="${cy+7}" x2="${cx-15}" y2="${cy+12}" stroke="${c.leg}" stroke-width="1.2" stroke-linecap="round"/>
<line x1="${cx-9}" y1="${cy+10}" x2="${cx-13}" y2="${cy+15}" stroke="${c.leg}" stroke-width="1.2" stroke-linecap="round"/>
<line x1="${cx+11}" y1="${cy+4}" x2="${cx+16}" y2="${cy+9}" stroke="${c.leg}" stroke-width="1.2" stroke-linecap="round"/>
<line x1="${cx+10}" y1="${cy+7}" x2="${cx+15}" y2="${cy+12}" stroke="${c.leg}" stroke-width="1.2" stroke-linecap="round"/>
<line x1="${cx+9}" y1="${cy+10}" x2="${cx+13}" y2="${cy+15}" stroke="${c.leg}" stroke-width="1.2" stroke-linecap="round"/>
<circle cx="${cx-5}" cy="${cy-8}" r="${eyeR}" fill="${c.eye}"/>
<circle cx="${cx+5}" cy="${cy-8}" r="${eyeR}" fill="${c.eye}"/>
${isSleeping?`<line x1="${cx-8}" y1="${cy-8}" x2="${cx-2}" y2="${cy-8}" stroke="${c.pupil}" stroke-width="1.5" stroke-linecap="round"/><line x1="${cx+2}" y1="${cy-8}" x2="${cx+8}" y2="${cy-8}" stroke="${c.pupil}" stroke-width="1.5" stroke-linecap="round"/><text x="${cx+10}" y="${cy-12}" font-size="6" fill="${c.antenna}" font-weight="bold">z</text><text x="${cx+14}" y="${cy-16}" font-size="7" fill="${c.antenna}" font-weight="bold">z</text>`:isError?`<line x1="${cx-7}" y1="${cy-10}" x2="${cx-3}" y2="${cy-6}" stroke="${c.pupil}" stroke-width="1.5" stroke-linecap="round"/><line x1="${cx-3}" y1="${cy-10}" x2="${cx-7}" y2="${cy-6}" stroke="${c.pupil}" stroke-width="1.5" stroke-linecap="round"/><line x1="${cx+3}" y1="${cy-10}" x2="${cx+7}" y2="${cy-6}" stroke="${c.pupil}" stroke-width="1.5" stroke-linecap="round"/><line x1="${cx+7}" y1="${cy-10}" x2="${cx+3}" y2="${cy-6}" stroke="${c.pupil}" stroke-width="1.5" stroke-linecap="round"/>`:`<circle cx="${cx-4}" cy="${cy-8.5}" r="${eyeR*0.45}" fill="${c.pupil}"/><circle cx="${cx+6}" cy="${cy-8.5}" r="${eyeR*0.45}" fill="${c.pupil}"/><circle cx="${cx-3.5}" cy="${cy-9}" r="${eyeR*0.2}" fill="white" opacity="0.8"/><circle cx="${cx+6.5}" cy="${cy-9}" r="${eyeR*0.2}" fill="white" opacity="0.8"/>`}
${isDone?`<text x="${cx-18}" y="${cy-10}" font-size="8">✨</text><text x="${cx+10}" y="${cy-10}" font-size="8">✨</text>`:""}
${mod.blush?`<ellipse cx="${cx-8}" cy="${cy-4}" rx="3" ry="1.5" fill="#FF8A80" opacity="0.5"/><ellipse cx="${cx+8}" cy="${cy-4}" rx="3" ry="1.5" fill="#FF8A80" opacity="0.5"/>`:""} 
${state==="searching"?`<circle cx="${cx+14}" cy="${cy-14}" r="4" fill="none" stroke="${c.antenna}" stroke-width="1.5"/><line x1="${cx+17}" y1="${cy-11}" x2="${cx+20}" y2="${cy-8}" stroke="${c.antenna}" stroke-width="1.5" stroke-linecap="round"/>`:""}
${state==="thinking"?`<circle cx="${cx+14}" cy="${cy-16}" r="2" fill="${c.antenna}" opacity="0.7"/><circle cx="${cx+17}" cy="${cy-19}" r="2.5" fill="${c.antenna}" opacity="0.7"/><circle cx="${cx+20}" cy="${cy-22}" r="3" fill="${c.antenna}" opacity="0.7"/><text x="${cx+17}" y="${cy-19}" font-size="5" fill="${c.eye}">?</text>`:""}
</svg>`;}

// Render stages
const stagesEl=document.getElementById("stages");
for(const[id,name]of Object.entries(STAGE_NAMES)){
  stagesEl.innerHTML+=`<div class="card"><div class="lobster-wrap anim-idle">${getLobsterSVG(id,"idle")}</div><div class="name">${name}</div></div>`;
}

// Render states for shrimp
const statesEl=document.getElementById("states");
for(const state of Object.keys(STATE_MODS)){
  statesEl.innerHTML+=`<div class="card"><div class="lobster-wrap anim-${state}">${getLobsterSVG("shrimp",state)}</div><div class="label">${state}</div></div>`;
}

// Render states for lobster
const statesEl2=document.getElementById("states2");
for(const state of Object.keys(STATE_MODS)){
  statesEl2.innerHTML+=`<div class="card"><div class="lobster-wrap anim-${state}">${getLobsterSVG("lobster",state)}</div><div class="label">${state}</div></div>`;
}
</script>
</body>
</html>
